# ⚠ Replace every "aniquiz.example.com" below with your real domain before deploying.
# This file is bind-mounted directly into /etc/nginx/conf.d, so Nginx does NOT run
# envsubst on it — variables like ${DOMAIN} would be read literally and break startup.
# Hardcode the domain (simplest), or move this to /etc/nginx/templates/*.template and
# set NGINX_ENVSUBST_FILTER=DOMAIN so only $DOMAIN is substituted (not $host/$remote_addr).

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl;
    http2 on;
    server_name aniquiz.example.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/aniquiz.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aniquiz.example.com/privkey.pem;

    # Modern TLS config (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Connection limit
    limit_conn conn_limit 20;

    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ─── WebSocket (/ws) ──────────────────────────────────────────────────────
    location /ws {
        limit_req zone=ws burst=5 nodelay;

        proxy_pass http://aniquiz_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ─── Auth endpoints — strict rate limiting ────────────────────────────────
    location ~ ^/api/auth/(register|login)$ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://aniquiz_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # ─── API endpoints ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://aniquiz_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ─── Health check (no rate limit) ─────────────────────────────────────────
    location /health {
        proxy_pass http://aniquiz_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Static assets (cache aggressively) ──────────────────────────────────
    location /assets/ {
        proxy_pass http://aniquiz_backend;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    # ─── SPA fallback ────────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://aniquiz_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }
}
