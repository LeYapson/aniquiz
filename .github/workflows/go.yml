name: CI/CD pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  #--- JOB BACKEND (GO) ---
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: build
      run: go build -v ./...

    - name: test
      run: go test -v ./... -cover

  #--- JOB FRONTEND (NODE) ---
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Deps
        # On vérifie où on est avec 'ls' en cas d'erreur
        run: |
          ls -R
          cd frontend && npm ci

      - name: Build Frontend
        run: cd frontend && npm run build
