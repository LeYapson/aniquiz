name: CI/CD pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  #--- JOB BACKEND (GO) ---
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: build
      run: go build -v ./...

    - name: test
      run: go test -v ./... -cover

  #--- JOB FRONTEND (NODE) ---
  frontend-build:
    runs-on: ubuntu-latest
    # On définit le dossier de travail par défaut pour tout ce job
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Le chemin est maintenant relatif au working-directory
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Deps
        run: npm ci

      - name: Build Frontend
        run: npm run build
