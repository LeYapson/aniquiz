name: CI/CD AniQuiz

on:
  push:
    branches: [main, "feature/**", "working/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# OCI/Docker image refs MUST be lowercase, but github.repository preserves the
# owner's casing (LeYapson/aniquiz) and GHA expressions have no toLowerCase().
# Pin the lowercase image name once and reuse it everywhere.
env:
  IMAGE_NAME: ghcr.io/leyapson/aniquiz

# ─── SECURITY ────────────────────────────────────────────────────────────────
jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # Report-only (exit-code: 0). A newly published CVE in a dependency must not
      # turn a green pipeline red with no code change. Flip to exit-code: 1 once the
      # dependency tree is pinned and triaged.
      - name: Trivy SAST (filesystem scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ─── BACKEND ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # NB: golangci-lint v2 (what `version: latest` installs) rejects the v1-format
      # .golangci.yml in this repo. Until the config is migrated to v2 and the
      # pre-existing errcheck/goimports findings are resolved, we keep the proven
      # go vet + gofmt gate that matches the repo's existing lint contract.
      - name: Lint (go vet + gofmt)
        run: |
          go vet ./...
          test -z "$(gofmt -l .)" || (echo "Unformatted files:" && gofmt -l . && exit 1)

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.out
          retention-days: 7

  # ─── FRONTEND ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Test
        working-directory: frontend
        run: npm run test:unit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─── E2E ─────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ─── DOCKER ──────────────────────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read # upload-sarif reads the workflow run for analysis metadata

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Trivy image scan
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # Scan by digest (exact + unambiguous) using the lowercase image name.
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      # Uploading to the Security tab requires code scanning, which is free on
      # PUBLIC repos but needs GitHub Advanced Security on PRIVATE repos. If it's
      # unavailable, don't fail the whole pipeline — the scan results are still in
      # the job log. Remove continue-on-error once code scanning is confirmed enabled.
      - name: Upload Trivy SARIF report
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─── DEPLOY STAGING ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy (Staging)
    runs-on: ubuntu-latest
    needs: [docker]
    # Skips cleanly (no red check) until you set repo variable ENABLE_DEPLOY=true
    # AND configure the staging secrets/environment. See docs/PRODUCTION_CHECKLIST.md.
    if: github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5

      # metadata-action pushes the SHORT sha tag (sha-<7>), so deploy must pull that.
      - name: Resolve image tag
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH || '/opt/aniquiz' }}

            # Pull the new image
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}

            # Tag as staging-current for rollback reference
            PREV=$(docker inspect --format='{{.Image}}' aniquiz-app 2>/dev/null || echo "")
            echo "Previous image: $PREV"

            # Update the compose file to pin the new SHA
            export IMAGE_TAG=${{ steps.tag.outputs.value }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans

            # Health check via the Nginx ingress (port 8080 is NOT published).
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(curl -sfk https://localhost/health && echo "ok" || echo "fail")
              if [ "$STATUS" = "ok" ]; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check failed (attempt $i/12)"
            done

            # Rollback on failure — re-deploy the previous tag through compose so the
            # container rejoins both proxy_net and app_net (a bare `docker run` would
            # only attach to one network and stay unreachable by Nginx).
            echo "Health check failed after 60s — rolling back"
            if [ -n "$PREV" ]; then
              export IMAGE_TAG="${PREV##*:}"
              docker compose -f docker-compose.prod.yml up -d --no-deps app
            fi
            exit 1

  # ─── DEPLOY PRODUCTION ───────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: [docker]
    # Requires ENABLE_DEPLOY=true plus production secrets/environment.
    if: startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_DEPLOY == 'true'
    environment:
      name: production
      url: ${{ vars.PROD_URL }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5

      # metadata-action's semver tag strips the leading "v" (v1.2.3 -> 1.2.3).
      - name: Resolve image tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH || '/opt/aniquiz' }}

            # Backup database before deploy
            ./scripts/backup-db.sh || echo "Warning: backup failed, proceeding"

            # Pull the versioned image
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            export IMAGE_TAG=${{ steps.tag.outputs.value }}

            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans

            # Health check via the Nginx ingress (port 8080 is NOT published).
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(curl -sfk https://localhost/health && echo "ok" || echo "fail")
              if [ "$STATUS" = "ok" ]; then
                echo "Deployed ${{ github.ref_name }} successfully"
                exit 0
              fi
            done
            echo "Production deploy health check failed"
            exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
