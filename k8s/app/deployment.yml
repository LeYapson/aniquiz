apiVersion: apps/v1
kind: Deployment
metadata:
  name: aniquiz
  namespace: aniquiz
  labels:
    app: aniquiz
  annotations:
    # Trigger rolling update by changing this value
    deploy-timestamp: "2024-01-01T00:00:00Z"
spec:
  # ⚠ WebSocket rooms are in-memory — horizontal scaling requires Redis pub/sub.
  # Set replicas: 1 until Redis is integrated. See docs/SCALING.md.
  replicas: 1
  selector:
    matchLabels:
      app: aniquiz
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: aniquiz
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: aniquiz
          image: ghcr.io/leyapson/aniquiz:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GIN_MODE
              valueFrom:
                configMapKeyRef:
                  name: aniquiz-config
                  key: GIN_MODE
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: aniquiz-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aniquiz-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aniquiz-secrets
                  key: JWT_SECRET
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: aniquiz-secrets
                  key: FRONTEND_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
      imagePullSecrets:
        - name: ghcr-credentials
